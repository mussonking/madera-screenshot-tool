name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libx11-dev \
            libxrandr-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libgtk-3-dev \
            libgtk-layer-shell-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Madera.SS ${{ github.ref_name }}'
          releaseBody: |
            **Madera.SS** -- The screenshot tool built for the AI era.

            ## Downloads

            - **Linux (.deb)** -- Ubuntu, Debian, Pop!_OS
            - **Linux (.AppImage)** -- Universal Linux binary
            - **Linux (.rpm)** -- Fedora, RHEL
            - **Windows (.exe)** -- Windows 10/11 installer
            - **Windows (.msi)** -- Windows MSI package

            ## Install

            See the [README](https://github.com/mussonking/madera-ss#installation) for installation instructions.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
