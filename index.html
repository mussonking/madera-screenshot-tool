<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screenshot Tool</title>
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        background-color: #000 !important;
      }
    </style>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        console.error("Global Error Caught:", message, error);
        alert("CRASH: " + message + "\nLine: " + lineno + "\n" + (error ? error.stack : ""));
      };
      window.addEventListener("unhandledrejection", function(e) {
        console.error("Promise Error:", e.reason);
        alert("PROMISE CRASH: " + e.reason);
      });
    </script>
    <!-- Google Fonts for themes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
